services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: product-catalog-app:v2
        restart: always
        ports:
            - '${APP_PORT:-8083}:80'
        environment:
            APP_NAME: '${APP_NAME:-Product Catalog}'
            APP_ENV: '${APP_ENV:-production}'
            APP_KEY: '${APP_KEY}'
            APP_DEBUG: '${APP_DEBUG:-false}'
            APP_URL: '${APP_URL:-https://product.interprima.co.id}'
            DB_CONNECTION: mysql
            DB_HOST: mysql
            DB_PORT: 3306
            DB_DATABASE: '${DB_DATABASE}'
            DB_USERNAME: '${DB_USERNAME}'
            DB_PASSWORD: '${DB_PASSWORD}'
            REDIS_HOST: redis
            REDIS_PORT: 6379
        volumes:
            - 'catalog_app_storage:/var/www/html/storage'
        networks:
            - sail
        depends_on:
            - mysql
            - redis
    mysql:
        image: 'mysql/mysql-server:8.0'
        ports:
            - '${FORWARD_DB_PORT:-3308}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
        volumes:
            - 'catalog_app_mysql:/var/lib/mysql'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - '-p${DB_PASSWORD}'
            retries: 3
            timeout: 5s
    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6380}:6379'
        volumes:
            - 'catalog_app_redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
    mailpit:
        image: 'axllent/mailpit:latest'
        ports:
            - '${FORWARD_MAILPIT_PORT:-1026}:1025'
            - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8026}:8025'
        networks:
            - sail
networks:
    sail:
        driver: bridge
volumes:
    catalog_app_mysql:
        driver: local
    catalog_app_redis:
        driver: local
    catalog_app_storage:
        driver: local
